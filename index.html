<body>

<!--
  This document contains ONLY structural containers.
  All content is rendered by /js/app.js from the /data/*.js files.
  To change content, edit the data files — not this HTML.
-->

<!-- STATUS BAR (rendered) -->
<div id="status-bar" role="banner"></div>

<!-- SIDEBAR (rendered) -->
<nav id="sidebar" aria-label="Portfolio navigation"></nav>

<!-- MAIN -->
<main id="main" tabindex="-1">
  <a href="#overview" class="skip-link">Skip to content</a>
  <div class="content">
    <section id="overview" class="grid-bg" aria-label="Overview"></section>
    <section id="why" aria-labelledby="why-h"></section>
    <section id="domains" aria-labelledby="domains-h"></section>
    <section id="principles" aria-labelledby="principles-h"></section>
    <section id="projects" aria-labelledby="projects-h"></section>
    <section id="building" aria-labelledby="building-h"></section>
    <section id="now" aria-labelledby="now-h"></section>
    <section id="impact" aria-labelledby="impact-h"></section>
    <section id="toolkit" aria-labelledby="toolkit-h"></section>
    <section id="contact" aria-labelledby="contact-h" style="padding-bottom:6rem"></section>
  </div>
</main>

<!-- MOBILE NAV (rendered) -->
<nav id="mobile-nav" aria-label="Mobile navigation"></nav>

<!--
  Loaded as classic scripts (no bundler/server required) so the site
  works when opened directly as a file. Order matters:
  data first, then helper modules, then app.js last.
-->
<!-- Data -->
<script src="data/site.js"></script>
<script src="data/overview.js"></script>
<script src="data/why-build.js"></script>
<script src="data/what-i-build.js"></script>

<script src="data/impact.js"></script>

<script src="data/contact.js"></script>
<!-- Behavior + renderer -->
<script src="js/renderer.js"></script>
<script src="js/animations.js"></script>
<script src="js/navigation.js"></script>
<script src="js/scrollspy.js"></script>
<!-- Entry point (must be last) -->
<script src="js/app.js"></script>
</body>
</html>
